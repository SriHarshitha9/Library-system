<!DOCTYPE html>
<html>
<head>
  <title>Return Book – LMS</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
</head>
<body>

<!-- REQ 4: Chart link on all pages -->
<div class="nav">
  <a href="javascript:history.back()">← Back</a>
  <a href="flowchart.html" class="chart-link">📊 View Flowchart</a>
</div>

<div class="container">
  <h2>Return Book</h2>

  <!-- REQ: Book name required (dropdown) -->
  <label style="display:block;font-size:13px;color:#555;margin-top:8px">Book Name *</label>
  <select id="rbook">
    <option value="">-- Select Book --</option>
  </select>

  <!-- REQ: Author auto-populated and non-editable -->
  <label style="display:block;font-size:13px;color:#555;margin-top:8px">Author</label>
  <input id="rauthor" placeholder="Author">

  <!-- REQ: Serial number mandatory -->
  <label style="display:block;font-size:13px;color:#555;margin-top:8px">Serial Number *</label>
  <input id="rserial" placeholder="Serial Number *" type="text">

  <!-- REQ: Issue date auto-populated and non-editable -->
  <label style="display:block;font-size:13px;color:#555;margin-top:8px">Issue Date</label>
  <input type="date" id="rissueDate" >

  <!-- REQ: Return date auto-populated from issue record; editable -->
  <label style="display:block;font-size:13px;color:#555;margin-top:8px">Return Date *</label>
  <input type="date" id="rreturnDate">

  <div id="msg"></div>

  <!-- REQ: Confirm takes user to Fine Pay page regardless of fine amount -->
  <button onclick="returnBook()">Confirm Return</button>
</div>

<script>
  loadReturnData();
</script>

</body>
</html>
